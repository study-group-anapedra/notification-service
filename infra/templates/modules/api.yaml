AWSTemplateFormatVersion: '2010-09-09'
Description: >
  API Gateway HTTP para o Microservico de Notificacao.
  Integra com Spring Cloud Function via AWS_PROXY Payload 1.0.

Parameters:
  ProjectName:
    Type: String
  Environment:
    Type: String
    AllowedValues: [dev, prod]

Resources:

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowMethods: [POST, OPTIONS]
        AllowOrigins: ["*"]

  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri:
        Fn::ImportValue: !Sub "${ProjectName}-${Environment}-LambdaArn"
      PayloadFormatVersion: '1.0'

  # ALINHAMENTO BACKEND: Rota unica para envio de notificacoes
  NotificationRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /notify"
      Target: !Sub "integrations/${LambdaIntegration}"

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: !Ref Environment
      AutoDeploy: true

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Fn::ImportValue: !Sub "${ProjectName}-${Environment}-LambdaArn"
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub
        - "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*/*"
        - { ApiId: !Ref HttpApi }

  # =====================================================
  # DOMINIO CUSTOMIZADO (Mantendo seu padrao)
  # =====================================================
  CustomDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: api.asantanadev.com
      DomainNameConfigurations:
        - CertificateArn: arn:aws:acm:us-east-1:365646127398:certificate/63e80d1b-c0cc-402b-a280-409296304096
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref HttpApi
      DomainName: !Ref CustomDomain
      Stage: !Ref Environment
      ApiMappingKey: ""

Outputs:
  ApiEndpoint:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"

  CustomDomainEndpoint:
    Value: "https://api.asantanadev.com/notify"

  ApiGatewayDomainName:
    Value: !GetAtt CustomDomain.RegionalDomainName
    Export:
      Name: !Sub "${ProjectName}-${Environment}-ApiGatewayDomainName"

  ApiGatewayHostedZoneId:
    Value: !GetAtt CustomDomain.RegionalHostedZoneId
    Export:
      Name: !Sub "${ProjectName}-${Environment}-ApiGatewayHostedZoneId"