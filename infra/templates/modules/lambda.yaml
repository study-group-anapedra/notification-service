AWSTemplateFormatVersion: '2010-09-09'
Description: Lambda do projeto Notification Service - Versao Java Final

Parameters:
  ProjectName:
    Type: String
  Environment:
    Type: String
    AllowedValues: [dev, prod]
  LambdaMemory:
    Type: Number
    Default: 512
  LambdaTimeout:
    Type: Number
    Default: 30
  ArtifactBucket:
    Type: String
  ArtifactKey:
    Type: String

Resources:
  NotificationServiceLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-handler"
      Runtime: java17
      Handler: com.luizalebs.notification_service.handler.NotificationServiceHandler::handleRequest
      MemorySize: !Ref LambdaMemory
      Timeout: !Ref LambdaTimeout
      Role:
        Fn::ImportValue: !Sub "${ProjectName}-${Environment}-LambdaExecutionRoleArn"
      Code:
        S3Bucket: !Ref ArtifactBucket
        S3Key: !Ref ArtifactKey
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          TABLE_NAME:
            Fn::ImportValue: !Sub "${ProjectName}-${Environment}-DynamoTable"
          SPRING_MAIL_HOST: email-smtp.us-east-1.amazonaws.com
          SPRING_MAIL_PORT: "587"
          SPRING_MAIL_USERNAME: "SEU_SMTP_USERNAME"
          SPRING_MAIL_PASSWORD: "SUA_SMTP_PASSWORD"
      Tags:
        - Key: project
          Value: !Ref ProjectName
        - Key: environment
          Value: !Ref Environment

  LambdaDynamoPermission:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${ProjectName}-${Environment}-dynamo-policy"
      Roles:
        - Fn::ImportValue: !Sub "${ProjectName}-${Environment}-LambdaExecutionRoleName"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:UpdateItem
              - dynamodb:Query
              - dynamodb:Scan
            Resource:
              - Fn::ImportValue: !Sub "${ProjectName}-${Environment}-DynamoTableArn"
              - !Sub
                - "${TableArn}/index/*"
                - TableArn: !ImportValue
                    Fn::Sub: "${ProjectName}-${Environment}-DynamoTableArn"

Outputs:
  LambdaArn:
    Description: ARN da Lambda
    Value: !GetAtt NotificationServiceLambda.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-LambdaArn"