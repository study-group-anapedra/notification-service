AWSTemplateFormatVersion: '2010-09-09'
Description: Lambda do Notification Service

Parameters:
  ProjectName:
    Type: String

  Environment:
    Type: String
    AllowedValues:
      - dev
      - prod

  LambdaMemory:
    Type: Number
    Default: 512

  LambdaTimeout:
    Type: Number
    Default: 30

  ArtifactBucket:
    Type: String

  ArtifactKey:
    Type: String

Resources:
  NotificationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-handler"
      Runtime: java17
      Handler: org.anasantana.handler.NotificationHandler::handleRequest
      MemorySize: !Ref LambdaMemory
      Timeout: !Ref LambdaTimeout
      Role:
        Fn::ImportValue: !Sub "${ProjectName}-${Environment}-LambdaExecutionRoleArn"
      Code:
        S3Bucket: !Ref ArtifactBucket
        S3Key: !Ref ArtifactKey
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          TABLE_NAME:
            Fn::ImportValue: !Sub "${ProjectName}-${Environment}-DynamoTable"
      Tags:
        - Key: project
          Value: !Ref ProjectName
        - Key: environment
          Value: !Ref Environment

  LambdaDynamoPermission:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${ProjectName}-${Environment}-dynamo-policy"
      Roles:
        - Fn::ImportValue: !Sub "${ProjectName}-${Environment}-LambdaExecutionRoleName"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:UpdateItem
              - dynamodb:Query
              - dynamodb:Scan
            Resource:
              - Fn::ImportValue: !Sub "${ProjectName}-${Environment}-DynamoTableArn"

Outputs:
  LambdaArn:
    Description: ARN da Lambda
    Value: !GetAtt NotificationLambda.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-LambdaArn"