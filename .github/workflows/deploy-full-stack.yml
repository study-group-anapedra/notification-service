name: Deploy Full Stack - Notification Service

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: notification-service
  ENVIRONMENT: prod

  ARTIFACT_BUCKET: notification-service-artifacts-ana
  ARTIFACT_KEY: lambda/notification-service.jar

  STACK_NAME_INFRA: notification-service-infra-prod
  STACK_NAME_DNS: notification-service-dns-prod

  DOMAIN_NAME: api.asantanadev.com
  HOSTED_ZONE_ID: Z05813481E1GHZSOTI0HO

jobs:
  deploy-infra:
    name: Build, Upload Artifact and Deploy Infrastructure
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: notification-service/pom.xml

      - name: Configurar credenciais AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 1) Build da Lambda
      - name: Build da Lambda
        run: |
          cd notification-service
          mvn clean package -DskipTests

      # 2) Upload do JAR para o S3
      # CORREÇÃO: O nome do arquivo JAR deve ser o que o Maven gera (SNAPSHOT-aws.jar)
      - name: Upload do JAR para o S3
        run: |
          aws s3 cp notification-service/target/notification-service-0.0.1-SNAPSHOT-aws.jar \
            s3://${{ env.ARTIFACT_BUCKET }}/${{ env.ARTIFACT_KEY }}

      # 3) Upload dos templates CloudFormation
      - name: Upload dos módulos CloudFormation para o S3
        run: |
          aws s3 sync infra/templates/modules \
            s3://${{ env.ARTIFACT_BUCKET }}/modules

      # 4) Package do template master
      - name: Package do template master
        run: |
          aws cloudformation package \
            --template-file infra/templates/master.yaml \
            --s3-bucket ${{ env.ARTIFACT_BUCKET }} \
            --output-template-file packaged-master.yaml

      # 5) Deploy do master stack
      - name: Deploy do Master Stack
        run: |
          aws cloudformation deploy \
            --template-file packaged-master.yaml \
            --stack-name ${{ env.STACK_NAME_INFRA }} \
            --capabilities CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              ProjectName=${{ env.PROJECT_NAME }} \
              Environment=${{ env.ENVIRONMENT }} \
              ArtifactsBucket=${{ env.ARTIFACT_BUCKET }}

  deploy-dns:
    name: Deploy DNS (Route53)
    runs-on: ubuntu-latest
    needs: deploy-infra
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      - name: Configurar credenciais AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy DNS Stack
        run: |
          aws cloudformation deploy \
            --template-file infra/templates/modules/dns.yaml \
            --stack-name ${{ env.STACK_NAME_DNS }} \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              ProjectName=${{ env.PROJECT_NAME }} \
              Environment=${{ env.ENVIRONMENT }} \
              DomainName=${{ env.DOMAIN_NAME }} \
              HostedZoneId=${{ env.HOSTED_ZONE_ID }}