# 1. SPRING CLOUD FUNCTION
spring.cloud.function.definition=notificationFunction

# 2. CONFIGURACOES DE EMAIL (AWS SES)
spring.mail.host=email-smtp.us-east-1.amazonaws.com
spring.mail.port=587
spring.mail.username=${AWS_SES_USERNAME}
spring.mail.password=${AWS_SES_PASSWORD}
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# 3. CONFIGURACOES AWS E DYNAMODB
aws.region=us-east-1
aws.dynamodb.endpoint=

# 4. LOGS
logging.level.com.luizalebs.notification_service=INFO